version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: fitnova_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: fitnova
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: fitnova_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgrespassword
      - POSTGRES_DB=fitnova
      - POSTGRES_PORT=5432
      - LOG_LEVEL=INFO
      - BACKEND_CORS_ORIGINS=["*"]
    depends_on:
      - db

volumes:
  postgres_data:
